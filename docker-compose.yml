version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reservely-db
    environment:
      POSTGRES_DB: reservely
      POSTGRES_USER: reservely
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reservely_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservely"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: reservely-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@reservely.tn
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
