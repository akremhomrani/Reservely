spring:
  application:
    name: reservely-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/reservely}
    username: ${DB_USERNAME:reservely}
    password: ${DB_PASSWORD:reservely_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "http://localhost:8080/api/auth/oauth2/callback/{registrationId}"

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000    # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  oauth2:
    authorized-redirect-uri: reservelyapp://oauth2/callback

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    tn.reservely: DEBUG
    org.springframework.security: INFO
