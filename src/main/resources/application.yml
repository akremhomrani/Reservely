spring:
  application:
    name: reservely-backend

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:reservely}
    username: ${PGUSER:${DB_USERNAME:reservely}}
    password: ${PGPASSWORD:${DB_PASSWORD:reservely_dev}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "http://localhost:8080/api/auth/oauth2/callback/{registrationId}"

app:
  jwt:
    secret: ${JWT_SECRET:II8Dx2g3DFhBnwz8BEC5HbwpqYobPOXVEvbkYBTqna1COkU27ydCSMAWZjZVFF4J3bo3UmHYghYkKxmTiYUsZw==}
    expiration-ms: 86400000    # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  oauth2:
    authorized-redirect-uri: reservelyapp://oauth2/callback

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    tn.reservely: DEBUG
    org.springframework.security: INFO
